# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name ishidyaaengicon.in www.ishidyaaengicon.in;
    return 301 https://$host$request_uri;
}

# HTTPS server - Restored to Static Page
server {
    listen 443 ssl;
    http2 on;
    server_name ishidyaaengicon.in www.ishidyaaengicon.in;

    ssl_certificate     /etc/letsencrypt/live/ishidyaaengicon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ishidyaaengicon.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/ishidyaa.access.log;
    error_log  /var/log/nginx/ishidyaa.error.log;

    location / {
        try_files $uri $uri/ =404;
    }
}
