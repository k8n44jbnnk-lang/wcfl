# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name ishidyaaengicon.in www.ishidyaaengicon.in;
    return 301 https://$host$request_uri;
}

# HTTPS server - Reverse Proxy to Fantasy App
server {
    listen 443 ssl http2;
    server_name ishidyaaengicon.in www.ishidyaaengicon.in;

    ssl_certificate     /etc/letsencrypt/live/ishidyaaengicon.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ishidyaaengicon.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/fantasy.access.log;
    error_log  /var/log/nginx/fantasy.error.log;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Static file serving optimization
    location /static/ {
        alias /home/ec2-user/static/;
        expires 30d;
        add_header Cache-Control 'public';
    }
}
