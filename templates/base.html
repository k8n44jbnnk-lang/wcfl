<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#05080f"/>
<title>World Cup Fantasy League 2026</title>
<!-- Social Preview Metadata -->
<meta property="og:title" content="World Cup Fantasy League"/>
<meta property="og:description" content="Track your teams, climb the standings, and win the prize pool in our WC2026 Fantasy League."/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<!-- Updated Football Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2285%22>⚽</text></svg>">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3.5"/>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body hx-boost="true">

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-brand">WC<span>2026</span> Fantasy</a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if active_page=='home' %}active{% endif %}">
        <i data-lucide="layout-dashboard" class="nav-icon"></i> <span>Dashboard</span>
      </a>
      <a href="/fixtures" class="nav-link {% if active_page=='fixtures' %}active{% endif %}">
        <i data-lucide="calendar" class="nav-icon"></i> <span>Tournament</span>
      </a>
      <a href="/groups" class="nav-link {% if active_page=='groups' %}active{% endif %}">
        <i data-lucide="grid" class="nav-icon"></i> <span>Groups</span>
      </a>
      <a href="/standings" class="nav-link {% if active_page=='standings' %}active{% endif %}">
        <i data-lucide="trophy" class="nav-icon"></i> <span>Standings</span>
      </a>
      <a href="/team-leaderboard" class="nav-link {% if active_page=='team-leaderboard' %}active{% endif %}">
        <i data-lucide="line-chart" class="nav-icon"></i> <span>Teams</span>
      </a>
      <a href="/how-to-play" class="nav-link {% if active_page=='how-to-play' %}active{% endif %}">
        <i data-lucide="info" class="nav-icon"></i> <span>Info</span>
      </a>
      <a href="/admin" class="nav-link {% if active_page=='admin' %}active{% endif %}">
        <i data-lucide="settings" class="nav-icon"></i> <span>Admin</span>
      </a>
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer style="text-align: center; padding: 2rem 1.5rem 6rem; color: var(--text-dim); font-size: 0.8rem; font-weight: 600;">
  Made with love by Him 💙
</footer>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>lucide.createIcons();</script>
{% block extra_js %}{% endblock %}
</body>
</html>
